name: CI

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main, develop]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Keep build artefacts between runs where possible
  CARGO_INCREMENTAL: 0

jobs:
  # ── Test + lint ─────────────────────────────────────────────────────────────
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      # Install protoc so prost-build can compile .proto files
      # libcurl4-openssl-dev is required because clippy --all-features pulls
      # the optional `kafka` adapter, which compiles rdkafka-sys → librdkafka
      # 2.12.1, whose rdkafka_conf.c always #includes <curl/curl.h> even when
      # configured with WITH_CURL=0.
      - name: Install protoc + libcurl-dev (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y protobuf-compiler libcurl4-openssl-dev

      - name: Install protoc (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      # ── Formatting check ─────────────────────────────────────────────────
      - name: Check formatting
        run: cargo fmt --all -- --check

      # ── Clippy (deny warnings) ────────────────────────────────────────────
      - name: Clippy
        run: cargo clippy --all --all-features -- -D warnings

      # ── Unit + integration tests ─────────────────────────────────────────
      - name: Run tests
        run: cargo test --all --verbose

  # ── Binary size check ────────────────────────────────────────────────────────
  binary-size:
    name: Binary size check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-release-${{ hashFiles('**/Cargo.lock') }}

      - name: Install protoc (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y protobuf-compiler

      - name: Install protoc (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} -p orp-core

      - name: Check binary size
        id: size
        shell: bash
        run: |
          BINARY="target/${{ matrix.target }}/release/orp"
          if [ ! -f "$BINARY" ]; then
            echo "Binary not found at $BINARY"
            exit 1
          fi
          SIZE_BYTES=$(stat -c%s "$BINARY" 2>/dev/null || stat -f%z "$BINARY")
          SIZE_MB=$((SIZE_BYTES / 1024 / 1024))
          echo "size_bytes=$SIZE_BYTES" >> "$GITHUB_OUTPUT"
          echo "size_mb=$SIZE_MB" >> "$GITHUB_OUTPUT"
          echo "Binary: $BINARY"
          echo "Size: ${SIZE_MB}MB (${SIZE_BYTES} bytes)"

          # Block if binary exceeds 400MB gate
          MAX_MB=400
          if [ "$SIZE_MB" -gt "$MAX_MB" ]; then
            echo "::error::Binary size ${SIZE_MB}MB exceeds gate of ${MAX_MB}MB"
            exit 1
          fi

          # Warn if binary exceeds soft budget of 350MB
          WARN_MB=350
          if [ "$SIZE_MB" -gt "$WARN_MB" ]; then
            echo "::warning::Binary size ${SIZE_MB}MB exceeds target of ${WARN_MB}MB"
          fi

      - name: Annotate binary size in step summary
        # Writes to $GITHUB_STEP_SUMMARY rather than posting a PR comment.
        # The previous `github-script` createComment call hit 403 on
        # cross-fork PRs (the GITHUB_TOKEN from the fork can't write to the
        # upstream issue). Step summary works for every event including
        # forks, requires no special permissions, and shows up in the
        # workflow run UI.
        shell: bash
        run: |
          {
            echo "### 📦 Binary size — \`${{ matrix.target }}\`"
            echo ""
            echo "**${{ steps.size.outputs.size_mb }} MB** (${{ steps.size.outputs.size_bytes }} bytes)"
          } >> "$GITHUB_STEP_SUMMARY"

  # ── Security audit ───────────────────────────────────────────────────────────
  security-audit:
    name: Security audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run security audit
        run: cargo audit

  # ── Doc check ────────────────────────────────────────────────────────────────
  docs:
    name: Documentation build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install protoc
        run: |
          sudo apt-get update -q
          sudo apt-get install -y protobuf-compiler

      - name: Build documentation
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: cargo doc --all --no-deps

  # ── Release builds ───────────────────────────────────────────────────────────
  build-release:
    name: Release build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: orp-linux-x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: orp-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: orp-macos-aarch64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: release-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Install protoc (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y protobuf-compiler

      - name: Install protoc (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }} -p orp-core

      - name: Strip binary (Linux)
        if: runner.os == 'Linux'
        run: strip target/${{ matrix.target }}/release/orp

      - name: Package binary
        shell: bash
        run: |
          mkdir -p dist/${{ matrix.artifact }}
          cp target/${{ matrix.target }}/release/orp dist/${{ matrix.artifact }}/
          cp LICENSE dist/${{ matrix.artifact }}/ 2>/dev/null || true
          cp README.md dist/${{ matrix.artifact }}/ 2>/dev/null || true
          tar czf ${{ matrix.artifact }}.tar.gz -C dist ${{ matrix.artifact }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
