  # ── INGEST ──────────────────────────────────────────────────────────────────

  /ingest:
    post:
      operationId: ingestEntity
      summary: Universal ingest — POST any JSON
      description: |
        The simplest possible integration. POST any JSON object and ORP will:
        1. Auto-detect the entity type from field heuristics (mmsi → ship, icao → aircraft, cve → threat, etc.)
        2. Generate or resolve a stable entity ID
        3. Store it in the knowledge graph
        4. Push it to WebSocket subscribers

        No pre-configuration required. Idempotent — re-ingesting the same physical entity updates rather than duplicates it.
      tags: [entities]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
              description: Any JSON object. At minimum, include identifying fields.
            examples:
              ship:
                summary: Maritime vessel (AIS)
                value:
                  mmsi: "123456789"
                  name: "MV Ever Given"
                  lat: 30.6936
                  lon: 32.3000
                  speed: 9.2
                  heading: 180
              aircraft:
                summary: Aircraft (ADS-B)
                value:
                  icao: "A1B2C3"
                  callsign: "SQ321"
                  altitude: 38000
                  lat: 1.3521
                  lon: 103.8198
                  speed: 512
              sensor:
                summary: IoT sensor
                value:
                  device_id: "sensor-warehouse-01"
                  temperature: 22.5
                  humidity: 61.2
                  lat: 51.9225
                  lon: 4.4792
              lorawan:
                summary: LoRaWAN uplink
                value:
                  dev_eui: "0102030405060708"
                  rssi: -85
                  snr: 7.5
                  temperature: 28.3
                  lat: 1.2935
                  lon: 103.8565
                  entity_type: sensor
              cef_event:
                summary: CEF security event
                value:
                  cef_version: 0
                  device_vendor: "Palo Alto Networks"
                  name: "Brute Force Login Attempt"
                  severity: 7
                  src_ip: "203.0.113.42"
                  entity_type: threat
      responses:
        '201':
          description: Entity ingested successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: Assigned entity ID
                  type:
                    type: string
                    description: Detected or assigned entity type
                  action:
                    type: string
                    enum: [created, updated]
                    description: Whether the entity was newly created or an existing one was updated
                  confidence:
                    type: number
                    format: float
                    description: Confidence score (0.0–1.0)
              example:
                id: "ship-mmsi-123456789"
                type: "ship"
                action: "created"
                confidence: 0.9
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'

  /ingest/batch:
    post:
      operationId: ingestBatch
      summary: Batch ingest — up to 1,000 entities in one request
      description: |
        Ingest an array of JSON objects in a single request. Partial failures
        are reported per-item without aborting the rest of the batch.
      tags: [entities]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              maxItems: 1000
              items:
                type: object
                additionalProperties: true
            example:
              - mmsi: "123456789"
                lat: 51.92
                lon: 4.47
              - icao: "A12345"
                altitude: 35000
              - temperature: 22.5
                humidity: 61.2
                device_id: "sensor-001"
      responses:
        '200':
          description: Batch processed (may include partial failures)
          content:
            application/json:
              schema:
                type: object
                properties:
                  summary:
                    type: object
                    properties:
                      total:
                        type: integer
                      succeeded:
                        type: integer
                      failed:
                        type: integer
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        index:
                          type: integer
                        id:
                          type: string
                        type:
                          type: string
                        action:
                          type: string
                          enum: [created, updated, failed]
                        error:
                          type: string
              example:
                summary:
                  total: 3
                  succeeded: 3
                  failed: 0
                results:
                  - index: 0
                    id: "ship-mmsi-123456789"
                    type: "ship"
                    action: "updated"
                  - index: 1
                    id: "aircraft-icao-a12345"
                    type: "aircraft"
                    action: "created"
                  - index: 2
                    id: "sensor-sensor-001"
                    type: "sensor"
                    action: "created"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'

  # ── FEDERATION PEERS ────────────────────────────────────────────────────────

  /peers:
    get:
      operationId: listPeers
      summary: List federation peers
      description: Returns all registered ORP peer instances and their connection status.
      tags: [system]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: List of peers
          content:
            application/json:
              schema:
                type: object
                properties:
                  peers:
                    type: array
                    items:
                      $ref: '#/components/schemas/Peer'
                  total:
                    type: integer
              example:
                peers:
                  - id: "node-b"
                    host: "orp-node-b.example.com"
                    port: 9090
                    status: "connected"
                    last_sync_at: "2026-03-27T10:00:00Z"
                    entities_synced: 1247
                    trust_score: 0.7
                total: 1
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

    post:
      operationId: registerPeer
      summary: Register a federation peer
      description: |
        Register another ORP instance as a peer. ORP will periodically pull
        entities from the peer and merge them into the local knowledge graph.
        Conflict resolution: highest `confidence` value wins.
      tags: [system]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PeerRegistration'
            example:
              id: "node-b"
              host: "orp-node-b.example.com"
              port: 9090
              shared_entity_types: ["ship", "aircraft", "threat"]
              sync_enabled: true
              trust_score: 0.7
      responses:
        '201':
          description: Peer registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Peer'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: Peer already registered
        '500':
          $ref: '#/components/responses/InternalError'

  /peers/{id}:
    parameters:
      - name: id
        in: path
        required: true
        description: Peer ID
        schema:
          type: string

    delete:
      operationId: removePeer
      summary: Remove a federation peer
      description: Disconnect and remove a peer. Entities already synced from this peer are retained.
      tags: [system]
      responses:
        '204':
          description: Peer removed
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /peers/{id}/sync:
    parameters:
      - name: id
        in: path
        required: true
        description: Peer ID
        schema:
          type: string

    post:
      operationId: syncPeer
      summary: Trigger immediate sync with a peer
      description: Bypasses the 30-second automatic sync interval and immediately pulls latest entities from the peer.
      tags: [system]
      responses:
        '200':
          description: Sync completed
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [ok]
                  peer_id:
                    type: string
                  entities_synced:
                    type: integer
                  synced_at:
                    type: string
                    format: date-time
              example:
                status: ok
                peer_id: "node-b"
                entities_synced: 42
                synced_at: "2026-03-27T10:05:00Z"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  # ── SYSTEM ──────────────────────────────────────────────────────────────────

  /health:
    get:
      operationId: getHealth
      summary: System health check
      description: |
        Returns health status for all system components. Used by load balancers
        and uptime monitoring. Does not require authentication.
      tags: [system]
      security: []
      responses:
        '200':
          description: System is healthy or degraded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              examples:
                healthy:
                  summary: All systems healthy
                  value:
                    status: healthy
                    timestamp: '2026-03-26T10:30:00Z'
                    version: 1.0.0
                    components:
                      database:
                        status: healthy
                        latency_ms: 2
                      graph_engine:
                        status: healthy
                        latency_ms: 5
                      stream_processor:
                        status: healthy
                        events_per_sec: 12500
                        queue_depth: 0
                      api_server:
                        status: healthy
                degraded:
                  summary: Degraded system state
                  value:
                    status: degraded
                    timestamp: '2026-03-26T10:30:00Z'
                    version: 1.0.0
                    components:
                      database:
                        status: healthy
                        latency_ms: 2
                      graph_engine:
                        status: degraded
                        latency_ms: 450
                      stream_processor:
                        status: healthy
                        events_per_sec: 12500
                        queue_depth: 150
                      api_server:
                        status: healthy
                unhealthy:
                  summary: Critical system failure
                  value:
                    status: unhealthy
                    timestamp: '2026-03-26T10:30:00Z'
                    version: 1.0.0
                    components:
                      database:
                        status: error
                      graph_engine:
                        status: error
                      stream_processor:
                        status: error
                      api_server:
                        status: healthy
        '503':
          description: Service unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /metrics:
    get:
      operationId: getMetrics
      summary: Prometheus metrics
      description: |
        Returns Prometheus-format metrics for scraping. Follows OpenTelemetry
        conventions. No authentication required (should be network-restricted in production).
      tags: [system]
      security: []
      responses:
        '200':
          description: Prometheus text-format metrics
          content:
            text/plain:
              schema:
                type: string
              example: |
                # HELP orp_entities_total Total number of entities
                # TYPE orp_entities_total gauge
                orp_entities_total{type="Ship"} 2847
                orp_entities_total{type="Port"} 512
                orp_entities_total{type="WeatherSystem"} 64

                # HELP orp_query_latency_ms Query execution latency
                # TYPE orp_query_latency_ms histogram
                orp_query_latency_ms_bucket{le="50"} 450
                orp_query_latency_ms_bucket{le="100"} 780
                orp_query_latency_ms_bucket{le="500"} 1200
                orp_query_latency_ms_bucket{le="5000"} 1250

                # HELP orp_stream_throughput_events_per_sec Stream processor throughput
                # TYPE orp_stream_throughput_events_per_sec gauge
                orp_stream_throughput_events_per_sec 12500

# ──────────────────────────────────────────────────────────────────────────────
# WEBSOCKET (documented as path, not a REST endpoint)
# ──────────────────────────────────────────────────────────────────────────────

  /ws/updates:
    get:
      operationId: wsUpdates
      summary: WebSocket real-time update stream
      description: |
        **WebSocket endpoint** — upgrade via `ws://` or `wss://`.

        Provides real-time entity updates via a subscription model.

        ### Connection
        ```
        ws://localhost:9090/ws/updates?token=<bearer_token>
        ```

        ### Client → Server Messages

        **Subscribe to entity type:**
        ```json
        { "type": "subscribe", "id": "sub-1", "data": { "entity_type": "Ship" } }
        ```

        **Subscribe to geographic region:**
        ```json
        { "type": "subscribe", "id": "sub-2", "data": { "entity_type": "Ship", "region": { "min_lat": 51.5, "min_lon": 3.0, "max_lat": 52.5, "max_lon": 5.0 } } }
        ```

        **Subscribe to specific entity:**
        ```json
        { "type": "subscribe", "id": "sub-3", "data": { "entity_id": "ship-imo-1234567" } }
        ```

        **Unsubscribe:**
        ```json
        { "type": "unsubscribe", "id": "unsub-1", "data": { "subscription_id": "sub-1" } }
        ```

        ### Server → Client Messages

        **Entity updated:**
        ```json
        { "type": "entity_update", "timestamp": "2026-03-26T10:42:15Z", "data": { "entity_id": "ship-imo-1234567", "entity_type": "Ship", "changes": { "speed": { "before": 18.5, "after": 19.2 }, "course": { "before": 225.0, "after": 230.0 } }, "source": "ais-feed-1" } }
        ```

        **Entity created:**
        ```json
        { "type": "entity_created", "timestamp": "2026-03-26T10:43:00Z", "data": { "entity_id": "ship-imo-9999999", "entity_type": "Ship", "entity_name": "New Vessel", "properties": { "mmsi": "123456789", "speed": 15.0 }, "source": "ais-feed-1" } }
        ```

        **Alert fired:**
        ```json
        { "type": "alert", "timestamp": "2026-03-26T10:44:00Z", "data": { "alert_id": "alert-001", "monitor_id": "mon-speed-coastal", "monitor_name": "Ships speeding in coastal zone", "severity": "critical", "affected_entities": [{ "entity_id": "ship-imo-1234567", "reason": "Speed 19.2 kn > threshold 12 kn" }] } }
        ```
      tags: [system]
      security:
        - BearerAuth: []
      parameters:
        - name: token
          in: query
          description: Bearer token for WebSocket authentication (alternative to Authorization header)
          schema:
            type: string
      responses:
        '101':
          description: Switching Protocols — WebSocket connection established
        '401':
          $ref: '#/components/responses/Unauthorized'

# ──────────────────────────────────────────────────────────────────────────────
# COMPONENTS
# ──────────────────────────────────────────────────────────────────────────────

components:

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: OIDC JWT token obtained from the /auth/login flow
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: API key with scoped permissions (prefix orpk_prod_)

  parameters:
    EntityIdParam:
      name: id
      in: path
      required: true
      description: Entity ID (URI-safe string)
      schema:
        type: string
      example: ship-imo-1234567

    PageParam:
      name: page
      in: query
      description: Page number (1-indexed)
      schema:
        type: integer
        minimum: 1
        default: 1
      example: 1

    LimitParam:
      name: limit
      in: query
      description: Items per page (max 1000)
      schema:
        type: integer
        minimum: 1
        maximum: 1000
        default: 100
      example: 50

    SortByParam:
      name: sort_by
      in: query
      description: Field name to sort by
      schema:
        type: string
      example: created_at

    SortOrderParam:
      name: sort_order
      in: query
      description: Sort direction
      schema:
        type: string
        enum: [asc, desc]
        default: desc

  schemas:

    # ── Federation ─────────────────────────────────────────────────────────────

    Peer:
      type: object
      properties:
        id:
          type: string
          description: Peer identifier
        host:
          type: string
          description: Peer hostname or IP
        port:
          type: integer
          description: Peer port (default 9090)
        status:
          type: string
          enum: [connected, disconnected, syncing, error]
        last_sync_at:
          type: string
          format: date-time
          nullable: true
        entities_synced:
          type: integer
          description: Total entities synced from this peer (lifetime)
        trust_score:
          type: number
          format: float
          minimum: 0.0
          maximum: 1.0
          description: Trust weight for data from this peer
      required: [id, host, port, status]

    PeerRegistration:
      type: object
      properties:
        id:
          type: string
          description: Unique identifier for this peer
        host:
          type: string
          description: Peer hostname or IP address
        port:
          type: integer
          description: Peer API port (default 9090)
          default: 9090
        shared_entity_types:
          type: array
          items:
            type: string
          description: Entity types to sync from this peer
          example: [ship, aircraft, threat]
        sync_enabled:
          type: boolean
          default: true
          description: Whether automatic periodic sync is enabled
        trust_score:
          type: number
          format: float
          minimum: 0.0
          maximum: 1.0
          default: 0.7
          description: Trust weight assigned to data received from this peer
      required: [id, host]

    # ── Pagination ─────────────────────────────────────────────────────────────

    PaginationInfo:
      type: object
      required: [page, limit, total_count, total_pages, has_next, has_prev]
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 100
        total_count:
          type: integer
          example: 2847
        total_pages:
          type: integer
          example: 29
        has_next:
          type: boolean
        has_prev:
          type: boolean

    PaginationLinks:
      type: object
      properties:
        first:
          type: string
        last:
          type: string
        next:
          type: string
          nullable: true
        prev:
          type: string
          nullable: true

    # ── Error ──────────────────────────────────────────────────────────────────

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, status, message, timestamp]
          properties:
            code:
              type: string
              description: Machine-readable error code
              example: NOT_FOUND
              enum:
                - INVALID_REQUEST
                - INVALID_QUERY
                - UNAUTHORIZED
                - FORBIDDEN
                - NOT_FOUND
                - CONFLICT
                - RATE_LIMITED
                - VALIDATION_ERROR
                - INTERNAL_ERROR
            status:
              type: integer
              description: HTTP status code
              example: 404
            message:
              type: string
              description: Human-readable error message
              example: Entity not found
            details:
              type: object
              additionalProperties: true
              description: Additional context for debugging
            trace_id:
              type: string
              description: Correlation ID for distributed tracing
            timestamp:
              type: string
              format: date-time
              example: '2026-03-26T10:30:45Z'

    # ── GeoJSON ────────────────────────────────────────────────────────────────

    GeoJsonGeometry:
      type: object
      required: [type, coordinates]
      properties:
        type:
          type: string
          enum: [Point, LineString, Polygon, MultiPoint]
        coordinates:
          description: GeoJSON coordinates ([lon, lat] for Point)
          oneOf:
            - type: array
              items:
                type: number
              description: Point coordinates [lon, lat]
            - type: array
              items:
                type: array
                items:
                  type: number
              description: LineString or ring coordinates
            - type: array
              items:
                type: array
                items:
                  type: array
                  items:
                    type: number
              description: Polygon coordinates

    # ── Freshness ──────────────────────────────────────────────────────────────

    Freshness:
      type: object
      required: [updated_at, checked_at]
      properties:
        updated_at:
          type: string
          format: date-time
          description: When entity properties were last changed
        checked_at:
          type: string
          format: date-time
          description: When entity was last validated

    # ── Entity ─────────────────────────────────────────────────────────────────

    Entity:
      type: object
      required: [id, type, name, tags, properties, confidence, created_at, updated_at]
      properties:
        id:
          type: string
          description: Unique entity identifier (URI-safe)
          example: ship-imo-1234567
        type:
          type: string
          description: Entity type
          example: Ship
        name:
          type: string
          description: Human-readable name
          example: Maersk Seatrade
        tags:
          type: array
          items:
            type: string
          example: [container, international, active]
        properties:
          type: object
          additionalProperties: true
          description: Type-specific entity properties
        geometry:
          $ref: '#/components/schemas/GeoJsonGeometry'
          nullable: true
        confidence:
          type: number
          format: double
          minimum: 0.0
          maximum: 1.0
          description: Data confidence score
          example: 0.99
        freshness:
          $ref: '#/components/schemas/Freshness'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    EntityDetail:
      allOf:
        - $ref: '#/components/schemas/Entity'
        - type: object
          properties:
            relationships:
              type: object
              properties:
                outgoing:
                  type: array
                  items:
                    $ref: '#/components/schemas/OutgoingRelationship'
                incoming:
                  type: array
                  items:
                    $ref: '#/components/schemas/IncomingRelationship'
            history:
              type: array
              items:
                $ref: '#/components/schemas/EntityHistoryEntry'

    EntityListResponse:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Entity'
        pagination:
          $ref: '#/components/schemas/PaginationInfo'
        links:
          $ref: '#/components/schemas/PaginationLinks'

    EntityHistoryEntry:
      type: object
      required: [timestamp, changed_properties, source]
      properties:
        timestamp:
          type: string
          format: date-time
        changed_properties:
          type: object
          additionalProperties: true
        source:
          type: string

    CreateEntityRequest:
      type: object
      required: [id, type, name, properties]
      properties:
        id:
          type: string
          description: Unique entity ID (must be URI-safe)
        type:
          type: string
        name:
          type: string
        tags:
          type: array
          items:
            type: string
          default: []
        properties:
          type: object
          additionalProperties: true
        geometry:
          $ref: '#/components/schemas/GeoJsonGeometry'
        confidence:
          type: number
          format: double
          minimum: 0.0
          maximum: 1.0
          default: 1.0
        source:
          type: string
          description: Data source identifier
        metadata:
          type: object
          additionalProperties: true
          description: Internal metadata (not exposed in queries)

    UpdateEntityRequest:
      type: object
      description: All fields are optional — only supplied fields are updated (merge semantics)
      properties:
        name:
          type: string
        tags:
          type: array
          items:
            type: string
        properties:
          type: object
          additionalProperties: true
        geometry:
          $ref: '#/components/schemas/GeoJsonGeometry'
        confidence:
          type: number
          format: double
          minimum: 0.0
          maximum: 1.0

    # ── Relationships ──────────────────────────────────────────────────────────

    OutgoingRelationship:
      type: object
      required: [id, type, target_id, target_type, target_name, created_at, updated_at]
      properties:
        id:
          type: string
        type:
          type: string
          example: HEADING_TO
        target_id:
          type: string
        target_type:
          type: string
        target_name:
          type: string
        properties:
          type: object
          additionalProperties: true
          nullable: true
        strength:
          type: number
          format: double
          minimum: 0.0
          maximum: 1.0
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    IncomingRelationship:
      type: object
      required: [id, type, source_id, source_type, source_name, created_at, updated_at]
      properties:
        id:
          type: string
        type:
          type: string
        source_id:
          type: string
        source_type:
          type: string
        source_name:
          type: string
        properties:
          type: object
          additionalProperties: true
          nullable: true
        strength:
          type: number
          format: double
          minimum: 0.0
          maximum: 1.0
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    RelationshipsResponse:
      type: object
      required: [entity_id, entity_type, outgoing, incoming, statistics]
      properties:
        entity_id:
          type: string
        entity_type:
          type: string
        outgoing:
          type: array
          items:
            $ref: '#/components/schemas/OutgoingRelationship'
        incoming:
          type: array
          items:
            $ref: '#/components/schemas/IncomingRelationship'
        statistics:
          type: object
          required: [total_outgoing, total_incoming]
          properties:
            total_outgoing:
              type: integer
            total_incoming:
              type: integer

    # ── Events ─────────────────────────────────────────────────────────────────

    EventRecord:
      type: object
      required: [id, timestamp, entity_id, entity_type, entity_name, event_type, changes, source]
      properties:
        id:
          type: string
          example: evt_1001
        timestamp:
          type: string
          format: date-time
        entity_id:
          type: string
        entity_type:
          type: string
        entity_name:
          type: string
        event_type:
          type: string
          enum:
            - property_change
            - relationship_created
            - relationship_deleted
            - entity_deleted
            - entity_created
        changes:
          type: object
          properties:
            before:
              type: object
              additionalProperties: true
              nullable: true
            after:
              type: object
              additionalProperties: true
              nullable: true
        source:
          type: string
        trace_id:
          type: string
          nullable: true

    EventsResponse:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/EventRecord'
        pagination:
          $ref: '#/components/schemas/PaginationInfo'

    # ── Query ──────────────────────────────────────────────────────────────────

    QueryRequest:
      type: object
      required: [query]
      properties:
        query:
          type: string
          description: ORP-QL query string
          example: "MATCH (s:Ship) WHERE s.speed > 15 RETURN s.id, s.name, s.speed"
        timeout_ms:
          type: integer
          default: 5000
          description: Query timeout in milliseconds
        limit:
          type: integer
          minimum: 1
          maximum: 10000
          default: 100
        offset:
          type: integer
          minimum: 0
          default: 0

    QueryResponse:
      type: object
      required: [status, results, metadata]
      properties:
        status:
          type: string
          enum: [success, error]
        results:
          type: array
          items:
            type: object
            additionalProperties: true
        metadata:
          type: object
          required: [execution_time_ms, rows_returned]
          properties:
            execution_time_ms:
              type: integer
            rows_returned:
              type: integer
            rows_scanned:
              type: integer
              nullable: true
        query_plan:
          type: string
          nullable: true
          description: Query execution plan (debug only)

    NaturalQueryRequest:
      type: object
      required: [query]
      properties:
        query:
          type: string
          description: Natural language question
          example: Which tankers are near Rotterdam?
        confidence_threshold:
          type: number
          format: double
          minimum: 0.0
          maximum: 1.0
          default: 0.7
        timeout_ms:
          type: integer
          default: 5000

    NaturalQueryResponse:
      type: object
      required: [status, natural_query, interpreted_query, confidence, interpretation_method, results, metadata]
      properties:
        status:
          type: string
          enum: [success, partial, ambiguous]
        natural_query:
          type: string
        interpreted_query:
          type: string
          description: Generated ORP-QL query
        confidence:
          type: number
          format: double
        interpretation_method:
          type: string
          enum: [template, model, interactive]
        results:
          type: array
          items:
            type: object
            additionalProperties: true
        alternatives:
          type: array
          nullable: true
          items:
            type: object
            properties:
              query:
                type: string
              confidence:
                type: number
        metadata:
          type: object
          required: [execution_time_ms, rows_returned]
          properties:
            execution_time_ms:
              type: integer
            rows_returned:
              type: integer

    GraphQueryRequest:
      type: object
      required: [query]
      properties:
        query:
          type: string
          description: Cypher query string (Kuzu)
          example: "MATCH (org:Organization {id: \"org-maersk\"})-[:OWNS]->(s:Ship)-[:HEADING_TO]->(p:Port) RETURN p.id, p.name, COUNT(*) as ships"
        timeout_ms:
          type: integer
          default: 5000

    GraphQueryResponse:
      type: object
      required: [status, results, metadata]
      properties:
        status:
          type: string
          enum: [success, error]
        results:
          type: array
          items:
            type: object
            additionalProperties: true
        metadata:
          type: object
          required: [execution_time_ms, rows_returned]
          properties:
            execution_time_ms:
              type: integer
            rows_returned:
              type: integer
        query_plan:
          type: string
          nullable: true

    # ── Connectors ─────────────────────────────────────────────────────────────

    ConnectorStats:
      type: object
      required: [total_ingested, last_event_at, error_count, events_per_sec]
      properties:
        total_ingested:
          type: integer
        last_event_at:
          type: string
          format: date-time
          nullable: true
        error_count:
          type: integer
        events_per_sec:
          type: number
          format: double

    Connector:
      type: object
      required: [id, name, type, enabled, status, config, stats, created_at, updated_at]
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
          enum: [ais, ads-b, http, mqtt, csv, json]
        enabled:
          type: boolean
        status:
          type: string
          enum: [healthy, degraded, error]
        config:
          type: object
          additionalProperties: true
          description: Type-specific configuration (secrets redacted)
        stats:
          $ref: '#/components/schemas/ConnectorStats'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ConnectorListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Connector'

    EntityMapping:
      type: object
      required: [entity_type, id_field]
      properties:
        entity_type:
          type: string
          example: Ship
        id_field:
          type: string
          example: mmsi
        name_field:
          type: string
          nullable: true
        geometry_field:
          type: string
          nullable: true
        properties:
          type: object
          additionalProperties:
            type: string

    CreateConnectorRequest:
      type: object
      required: [name, type, config, entity_mapping]
      properties:
        name:
          type: string
        type:
          type: string
          enum: [ais, ads-b, http, mqtt, csv, json]
        enabled:
          type: boolean
          default: true
        config:
          type: object
          additionalProperties: true
        entity_mapping:
          $ref: '#/components/schemas/EntityMapping'

    UpdateConnectorRequest:
      type: object
      properties:
        name:
          type: string
        enabled:
          type: boolean
        config:
          type: object
          additionalProperties: true
        entity_mapping:
          $ref: '#/components/schemas/EntityMapping'

    # ── Monitors ───────────────────────────────────────────────────────────────

    MonitorCondition:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [threshold, geospatial, relationship, anomaly]
        query:
          type: string
          nullable: true
          description: ORP-QL query that returns matching entities when condition is met

    MonitorAction:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [webhook, email, internal_alert, custom]
        target:
          type: string
          nullable: true
          description: Webhook URL, email address, or custom target
        template:
          type: string
          nullable: true

    Monitor:
      type: object
      required: [id, name, enabled, entity_type, condition, action, trigger_count, created_at, updated_at]
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        enabled:
          type: boolean
        entity_type:
          type: string
        condition:
          $ref: '#/components/schemas/MonitorCondition'
        action:
          $ref: '#/components/schemas/MonitorAction'
        last_triggered:
          type: string
          format: date-time
          nullable: true
        trigger_count:
          type: integer
        cooldown_seconds:
          type: integer
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    MonitorListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Monitor'

    CreateMonitorRequest:
      type: object
      required: [name, entity_type, condition, action]
      properties:
        name:
          type: string
        description:
          type: string
        enabled:
          type: boolean
          default: true
        entity_type:
          type: string
        condition:
          $ref: '#/components/schemas/MonitorCondition'
        action:
          $ref: '#/components/schemas/MonitorAction'
        cooldown_seconds:
          type: integer
          nullable: true

    UpdateMonitorRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        enabled:
          type: boolean
        condition:
          $ref: '#/components/schemas/MonitorCondition'
        action:
          $ref: '#/components/schemas/MonitorAction'
        cooldown_seconds:
          type: integer

    # ── Alerts ─────────────────────────────────────────────────────────────────

    AffectedEntity:
      type: object
      required: [entity_id, entity_type]
      properties:
        entity_id:
          type: string
        entity_type:
          type: string
        entity_name:
          type: string
          nullable: true
        reason:
          type: string
          nullable: true

    Alert:
      type: object
      required: [id, monitor_id, monitor_name, severity, timestamp, acknowledged, affected_entities]
      properties:
        id:
          type: string
        monitor_id:
          type: string
        monitor_name:
          type: string
        severity:
          type: string
          enum: [critical, warning, info]
        timestamp:
          type: string
          format: date-time
        acknowledged:
          type: boolean
        acknowledged_at:
          type: string
          format: date-time
          nullable: true
        acknowledged_by:
          type: string
          nullable: true
        affected_entities:
          type: array
          items:
            $ref: '#/components/schemas/AffectedEntity'

    AlertListResponse:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Alert'
        pagination:
          $ref: '#/components/schemas/PaginationInfo'

    # ── API Keys ───────────────────────────────────────────────────────────────

    ApiKeyMeta:
      type: object
      required: [id, name, scopes, rate_limit, created_at]
      properties:
        id:
          type: string
        name:
          type: string
        scopes:
          type: array
          items:
            type: string
        rate_limit:
          type: integer
          description: Maximum requests per second
        created_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
          nullable: true
        last_used_at:
          type: string
          format: date-time
          nullable: true

    ApiKeyCreated:
      allOf:
        - $ref: '#/components/schemas/ApiKeyMeta'
        - type: object
          required: [api_key]
          properties:
            api_key:
              type: string
              description: The secret API key (only returned at creation time)
              example: orpk_prod_abc123def456ghi789

    CreateApiKeyRequest:
      type: object
      required: [name, scopes]
      properties:
        name:
          type: string
          description: Descriptive name for this key
          example: monitoring-service
        scopes:
          type: array
          items:
            type: string
            enum:
              - entities:read
              - entities:write
              - graph:read
              - graph:write
              - monitors:read
              - monitors:write
              - connectors:read
              - connectors:write
              - admin
          example: [entities:read, monitors:read]
        rate_limit:
          type: integer
          description: Max requests per second (default 1000)
          default: 1000
        expires_in:
          type: integer
          nullable: true
          description: Expiry in seconds from now. Omit for no expiry.
          example: 31536000

    # ── Health ─────────────────────────────────────────────────────────────────

    ComponentHealth:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [healthy, degraded, error]
        latency_ms:
          type: integer
          nullable: true

    StreamHealth:
      allOf:
        - $ref: '#/components/schemas/ComponentHealth'
        - type: object
          properties:
            events_per_sec:
              type: number
              nullable: true
            queue_depth:
              type: integer
              nullable: true

    HealthResponse:
      type: object
      required: [status, timestamp, version, components]
      properties:
        status:
          type: string
          enum: [healthy, degraded, unhealthy]
        timestamp:
          type: string
          format: date-time
        version:
          type: string
          example: 1.0.0
        components:
          type: object
          required: [database, graph_engine, stream_processor, api_server]
          properties:
            database:
              $ref: '#/components/schemas/ComponentHealth'
            graph_engine:
              $ref: '#/components/schemas/ComponentHealth'
            stream_processor:
              $ref: '#/components/schemas/StreamHealth'
            api_server:
              $ref: '#/components/schemas/ComponentHealth'

  # ── Responses ─────────────────────────────────────────────────────────────

  responses:
    BadRequest:
      description: Bad request — malformed JSON or missing required fields
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: INVALID_REQUEST
              status: 400
              message: Missing required field 'id'
              details:
                field: id
                reason: required
              timestamp: '2026-03-26T10:30:45Z'

    Unauthorized:
      description: Authentication required or token invalid/expired
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: UNAUTHORIZED
              status: 401
              message: Bearer token is expired
              details:
                reason: token_expired
              timestamp: '2026-03-26T10:30:45Z'

    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: FORBIDDEN
              status: 403
              message: Permission denied
              details:
                required_scope: entities:write
              timestamp: '2026-03-26T10:30:45Z'

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: NOT_FOUND
              status: 404
              message: Entity not found
              details:
                id: ship-unknown-999
                type: Entity
              timestamp: '2026-03-26T10:30:45Z'

    Conflict:
      description: Conflict — resource already exists or state conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    ValidationError:
      description: Semantic validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: VALIDATION_ERROR
              status: 422
              message: Validation failed
              details:
                field: confidence
                reason: must be between 0.0 and 1.0
              timestamp: '2026-03-26T10:30:45Z'

    RateLimited:
      description: Too many requests
      headers:
        Retry-After:
          schema:
            type: integer
          description: Seconds until rate limit resets
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: RATE_LIMITED
              status: 429
              message: Rate limit exceeded
              details:
                retry_after_seconds: 60
              timestamp: '2026-03-26T10:30:45Z'

    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: INTERNAL_ERROR
              status: 500
              message: An unexpected error occurred
              details:
                trace_id: req_abc123
              timestamp: '2026-03-26T10:30:45Z'
