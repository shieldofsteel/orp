[package]
name = "orp-connector"
version.workspace = true
edition.workspace = true

[dependencies]
orp-proto = { path = "../orp-proto" }
serde = { workspace = true }
serde_json = { workspace = true }
chrono = { workspace = true }
uuid = { workspace = true }
async-trait = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
tokio = { workspace = true }
reqwest = { version = "0.12", features = ["json"] }
# NMEA connector: serial port access (Linux/macOS /dev/ttyUSB*)
# The serial feature falls back to raw file IO on platforms without tokio-serial.
# Uncomment to enable proper baud-rate control via tokio-serial:
# tokio-serial = { version = "5", optional = true }
