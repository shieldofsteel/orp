syntax = "proto3";

package orp.event;

import "google/protobuf/timestamp.proto";
import "google/protobuf/struct.proto";

// Canonical ORP Event — all events conform to this format
message OrpEvent {
  string event_id = 1;
  string entity_id = 2;
  string entity_type = 3;
  string event_type = 4;
  google.protobuf.Timestamp event_timestamp = 5;
  google.protobuf.Timestamp ingestion_timestamp = 6;
  string source_id = 7;
  float source_trust = 8;
  EventPayload payload = 9;
  double confidence = 10;
  EventSeverity severity = 11;
  bytes signature = 12;
  AuditMetadata audit = 13;
  GeoPoint geo = 14;
}

enum EventSeverity {
  INFO = 0;
  WARNING = 1;
  CRITICAL = 2;
}

message GeoPoint {
  double lat = 1;
  double lon = 2;
  optional double alt = 3;
}

message AuditMetadata {
  optional string user_id = 1;
  optional string api_key_id = 2;
  string operation_id = 3;
}

message EventPayload {
  oneof variant {
    PositionUpdate position_update = 1;
    PropertyChange property_change = 2;
    StateTransition state_transition = 3;
    RelationshipChange relationship_change = 4;
    AlertTriggered alert_triggered = 5;
    CustomData custom = 6;
  }
}

message PositionUpdate {
  double latitude = 1;
  double longitude = 2;
  optional double altitude = 3;
  optional float accuracy_meters = 4;
  optional double speed_knots = 5;
  optional double heading_degrees = 6;
  optional double course_degrees = 7;
}

message PropertyChange {
  string key = 1;
  optional string old_value = 2;
  string new_value = 3;
  bool is_derived = 4;
}

message StateTransition {
  string from_state = 1;
  string to_state = 2;
  optional string reason = 3;
}

enum RelationshipAction {
  CREATED = 0;
  UPDATED = 1;
  DELETED = 2;
}

message RelationshipChange {
  string relationship_type = 1;
  string target_entity_id = 2;
  RelationshipAction action = 3;
  map<string, string> properties = 4;
}

message AlertTriggered {
  string monitor_id = 1;
  EventSeverity severity = 2;
  string message = 3;
  google.protobuf.Struct evidence = 4;
}

message CustomData {
  google.protobuf.Struct data = 1;
}

message Entity {
  string entity_id = 1;
  string entity_type = 2;
  optional string canonical_id = 3;
  optional string name = 4;
  double confidence = 5;
  google.protobuf.Timestamp last_updated = 6;
  GeoPoint geometry = 7;
  bool is_active = 8;
  map<string, string> properties = 9;
}
